<!-- Font Awesome 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    /* Police Goodly */
    @font-face {
        font-family: 'Goodly';
        src: local('Goodly'), local('SF Pro Text'), local('Segoe UI'), local('Helvetica Neue');
        font-display: swap;
    }

    * {
        font-family: 'Goodly', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    /* Couleurs */
    :root {
        --pharma-blue: #2C5F8A;
        --pharma-vert: #2E8B57;
    }

    /* EFFET GLASS TRÈS RENFORCÉ - blur 24px (niveau élevé) */
    .navbar-glass {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    /* Hauteur fixe à 15vh */
    .navbar-height {
        height: 15vh;
        min-height: 80px;
        max-height: 110px;
    }

    /* Bordures arrondies en bas */
    .rounded-bottom-nav {
        border-bottom-left-radius: 32px;
        border-bottom-right-radius: 32px;
    }

    @media (max-width: 768px) {
        .rounded-bottom-nav {
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .navbar-height {
            height: auto;
            min-height: 65px;
            padding: 0.4rem 0;
        }
    }

    /* Conteneur des liens - centrage parfait avec espacement équitable */
    .nav-links-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
    }

    @media (min-width: 1024px) {
        .nav-links-container {
            gap: 3.5rem;
        }
    }

    /* Style des liens - police légèrement réduite */
    .nav-link-glass {
        transition: all 0.25s ease;
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
    }

    .nav-link-glass i {
        font-size: 0.8rem;
    }

    .nav-link-glass:hover {
        background: rgba(255, 255, 255, 0.55);
        color: var(--pharma-vert);
        transform: translateY(-1px);
    }

    /* Bouton Essai gratuit : solide, sans glass */
    .btn-solid {
        background: linear-gradient(135deg, #2E8B57 0%, #1f6e46 100%);
        box-shadow: 0 4px 12px rgba(46, 139, 87, 0.3);
        transition: all 0.25s ease;
        font-size: 0.85rem;
        padding: 0.5rem 1.2rem;
    }

    .btn-solid i {
        font-size: 0.8rem;
    }

    .btn-solid:hover {
        background: linear-gradient(135deg, #267349 0%, #195a3a 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(46, 139, 87, 0.4);
    }

    /* Bouton connexion avec glass léger - police réduite */
    .btn-outline-glass {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(44, 95, 138, 0.35);
        transition: all 0.25s ease;
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
    }

    .btn-outline-glass i {
        font-size: 0.8rem;
    }

    .btn-outline-glass:hover {
        background: rgba(255, 255, 255, 0.7);
        border-color: rgba(44, 95, 138, 0.6);
        transform: translateY(-1px);
    }

    /* Taille du texte du logo réduite */
    .logo-text {
        font-size: 1rem;
    }

    .slogan-text {
        font-size: 0.6rem;
    }

    @media (min-width: 768px) {
        .logo-text {
            font-size: 1.1rem;
        }

        .slogan-text {
            font-size: 0.65rem;
        }

        .nav-link-glass {
            font-size: 0.9rem;
        }

        .btn-solid,
        .btn-outline-glass {
            font-size: 0.9rem;
        }
    }

    /* Conteneur principal pour centrage vertical parfait */
    .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 100%;
    }

    /* Sections flex pour un centrage équilibré */
    .logo-section {
        flex: 1;
        display: flex;
        justify-content: flex-start;
    }

    .links-section {
        flex: 2;
        display: flex;
        justify-content: center;
    }

    .buttons-section {
        flex: 1;
        display: flex;
        justify-content: flex-end;
    }

    @media (max-width: 768px) {

        .logo-section,
        .links-section,
        .buttons-section {
            flex: auto;
        }

        .links-section {
            display: none;
        }

        .logo-text {
            font-size: 0.95rem;
        }
    }

    /* Style pour l'icône du logo */
    .logo-icon {
        width: 2rem;
        height: 2rem;
    }

    @media (min-width: 768px) {
        .logo-icon {
            width: 2.2rem;
            height: 2.2rem;
        }
    }
</style>
</head>

                <!-- SECTION LIENS (centrés, équidistants, police réduite) -->
                <div class="links-section">

    <script>
        const menuBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
            const mobileLinks = mobileMenu.querySelectorAll('a');
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                });
            });
        }
    </script>
