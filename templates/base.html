<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}PharmaConnect Cameroun{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts pour Goodly (fallback) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">

    <style>
        /* Définition de la police Goodly */
        @font-face {
            font-family: 'Goodly';
            src: url("{{ url_for('static', filename='fonts/Goodly-Regular.woff2') }}") format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Goodly';
            src: url("{{ url_for('static', filename='fonts/Goodly-Bold.woff2') }}") format('woff2');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        * {
            font-family: 'Goodly', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(46, 139, 87, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(46, 139, 87, 0.7);
        }

        .nav-active {
            background: rgba(46, 139, 87, 0.15);
            color: #2E8B57;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="antialiased">
{% include 'layout/menu.html' %}

    <!-- CONTENU PRINCIPAL -->
    <main class="animate-fadeIn">
        {% block content %}{% endblock %}
    </main>

    {% include 'layout/footer.html' %}
    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        setTimeout(() => {
            document.querySelectorAll('.flash-message').forEach(msg => {
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 300);
            });
        }, 5000);

        const currentPath = window.location.pathname;
        if (currentPath === '/' || currentPath === '') {
            const homeLink = document.getElementById('nav-home');
            if (homeLink) homeLink.classList.add('nav-active');
        } else if (currentPath.startsWith('/pharmacies')) {
            const pharmaciesLink = document.getElementById('nav-pharmacies');
            if (pharmaciesLink) pharmaciesLink.classList.add('nav-active');
        } else if (currentPath.startsWith('/anti-counterfeit')) {
            const antifakeLink = document.getElementById('nav-antifake');
            if (antifakeLink) antifakeLink.classList.add('nav-active');
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
